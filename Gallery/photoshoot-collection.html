<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morissette Fan Site</title>

  <link rel="stylesheet" href="Phototshoot.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
  
<body>

  <header>
  <nav>
    <h1 class="logo">MORISSETTE</h1>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#performances">Performances</a></li>
      <li><a href="#awards">Awards</a></li>
      <li><a href="#updates">Updates</a></li>
      <li><a href="#gallery">Gallery</a></li>
    </ul>

  </nav>
</header>


 <!-- GALLERY -->
<section class="gallery" id="gallery">
  <h2>Phoenix Collection</h2>

  <div class="slideshow-container">
    <!-- Slides will be generated by JS -->
  </div>

  <div class="dots-container">
    <span class="dot" data-position="first"></span>
    <span class="dot" data-position="middle"></span>
    <span class="dot" data-position="last"></span>
  </div>
</section>

<script src="slideshow1.js"></script>

</section>

  






  <!-- FOOTER -->
  <footer>
    <p>
      Made with love by Stan Morissette.
    </p>
  </footer>




<script>
function toggleMenu(){
  const nav = document.querySelector(".nav-links");
  const toggle = document.querySelector(".menu-toggle");

  nav.classList.toggle("show");

  // change icon
  if(nav.classList.contains("show")){
    toggle.textContent = "✕";
  } else {
    toggle.textContent = "☰";
  }
}

// Hide menu when a nav link is clicked (mobile)
document.querySelectorAll(".nav-links a").forEach(link => {
  link.addEventListener("click", () => {
    document.querySelector(".nav-links").classList.remove("show");
    document.querySelector(".menu-toggle").textContent = "☰";
  });
});
</script>

</body>
</html>
